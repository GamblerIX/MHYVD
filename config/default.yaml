# MHYVD default configuration.
#
# This file mirrors the built-in defaults in ``src/config/defaults.py``
# (DEFAULT_CONFIG and DEFAULT_RULES). It is the file loaded by
# ``Config`` when no explicit configuration path is supplied
# (Requirement 9.2). User-supplied configuration is merged over these
# values, so every required value (Requirement 9.5) has a sensible
# fallback here.

# The selected Source_Key.
source_key: honkai-star-rail/cn

# The selected classifier plugin.
classifier: rule_based

# Directory videos are written under.
output_dir: downloads

# Maximum number of concurrent downloads.
concurrency: 1

# Number of resolution attempts before giving up.
retry_count: 3

# Per-operation timeout in seconds.
timeout: 300

# Classification rules. Order matters: the classifier assigns the
# category of the first rule whose keyword appears in a title.
rules:
  - category: videos/pv/character
    keywords:
      - "角色 PV"
      - "角色PV"
  - category: videos/pv/version
    keywords:
      - "版本 PV"
      - "版本PV"
  - category: videos/pv/starrytour
    keywords:
      - "千星纪游 PV"
      - "千星纪游PV"
