name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run mypy src tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run playwright install --with-deps chromium
      # Root suite: the smoke test is collected here too but stays skipped
      # (RUN_BROWSER_SMOKE unset), so it runs exactly once — in the step below.
      - run: uv run python -m unittest discover -s tests
      - run: uv run python -m unittest discover -s tests/integration
        env:
          RUN_BROWSER_SMOKE: "1"
